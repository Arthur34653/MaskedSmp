
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Masked SMP | Official</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2285%22 font-family=%22Arial Black, sans-serif%22 fill=%22%2339ff14%22>M</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Orbitron:wght@900&display=swap');

        :root {
            --accent-green: #39ff14;
            --vortex-purple: #a855f7;
            --bg-dark: #060606;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --current-theme: var(--accent-green);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; width: 100%; top: 0; z-index: 1000;
            backdrop-filter: blur(20px);
            background: rgba(6, 6, 6, 0.8);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem;
            display: flex; justify-content: center; gap: 40px;
            transition: 0.5s ease;
        }

        nav a {
            color: #666; text-decoration: none; font-size: 0.8rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.4s;
            cursor: pointer;
        }

        nav a:hover { color: #fff; }
        nav a.active { color: var(--current-theme); text-shadow: 0 0 15px var(--current-theme); }

        /* --- CONTENT SECTIONS --- */
        .content-section { 
            display: none; padding: 160px 20px 60px; 
            max-width: 1100px; margin: 0 auto; 
            animation: fadeIn 0.8s ease;
        }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HOME HERO --- */
        .hero { text-align: center; }
        .hero h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: clamp(3rem, 10vw, 6rem); 
            letter-spacing: -2px; margin-bottom: 20px; 
            color: var(--accent-green); 
            text-shadow: 0 0 30px rgba(57, 255, 20, 0.3); 
        }
        
        .copy-card {
            background: #fff; color: #000;
            padding: 15px 30px; border-radius: 12px;
            display: inline-flex; align-items: center; gap: 15px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; margin-bottom: 40px;
        }
        .copy-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,255,255,0.2); }

        /* --- CREATOR LINKS ON HOME --- */
        .creator-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .yt-btn {
            text-decoration: none; padding: 12px 24px; border-radius: 8px;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; border: 1px solid var(--border);
        }
        .yt-vortex { color: var(--vortex-purple); background: rgba(168, 85, 247, 0.1); border-color: var(--vortex-purple); }
        .yt-alien { color: var(--accent-green); background: rgba(57, 255, 20, 0.1); border-color: var(--accent-green); }
        .yt-btn:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* --- VIDEO GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; }
        .video-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px; transition: 0.4s; }
        .vortex-card:hover { border-color: var(--vortex-purple); box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); }
        .alien-card:hover { border-color: var(--accent-green); box-shadow: 0 10px 30px rgba(57, 255, 20, 0.2); }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; }

        footer { text-align: center; padding: 120px 0 40px; color: #444; font-size: 0.7rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }

    </style>
</head>
<body>

    <nav id="navbar">
        <a onclick="showTab('home', 'green')" id="home-btn" class="active">Home</a>
        <a onclick="showTab('vortex', 'purple')" id="vortex-btn">V0RT6X1</a>
        <a onclick="showTab('alien', 'green')" id="alien-btn">RoyalAlien</a>
        <a href="https://discord.gg/rSpjn7XxKe" target="_blank">Discord</a>
    </nav>

    <div id="home" class="content-section active">
        <div class="hero">
            <h1>MASKED SMP</h1>
            <div class="copy-card" onclick="copyIP()">
                <span>66.51.97.61:25560</span>
                <span id="copy-status" style="background:#000; color:#fff; padding:4px 8px; border-radius:4px; font-size:0.7rem;">COPY IP</span>
            </div>
            
            <p style="color:#666; font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:15px;">Featured Creators</p>
            <div class="creator-links">
                <a href="https://www.youtube.com/@V0RT6X1" target="_blank" class="yt-btn yt-vortex">V0RT6X1 YouTube</a>
                <a href="https://www.youtube.com/@Proximally" target="_blank" class="yt-btn yt-alien">RoyalAlien Youtube</a>
            </div>
        </div>
    </div>

    <div id="vortex" class="content-section">
        <h2 style="margin-bottom:30px; font-family:'Orbitron'; color:var(--vortex-purple); letter-spacing:2px;">V0RT6X1 ARCHIVE</h2>
        <div class="grid">
            <div class="video-card vortex-card">
                <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=V0RT6X1" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            <div class="video-card vortex-card">
                <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=V0RT6X1&index=1" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

    <div id="alien" class="content-section">
        <h2 style="margin-bottom:30px; font-family:'Orbitron'; color:var(--accent-green); letter-spacing:2px;">ROYALALIEN ARCHIVE</h2>
        <div class="grid">
            <div class="video-card alien-card">
                <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=Proximally" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            <div class="video-card alien-card">
                <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=Proximally&index=1" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer>
        Masked Smp Powerd by V0RT6X
    </footer>

    <script>
        function showTab(tabId, theme) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(tabId + '-btn').classList.add('active');

            const root = document.querySelector(':root');
            if (theme === 'purple') {
                root.style.setProperty('--current-theme', 'var(--vortex-purple)');
                document.getElementById('navbar').style.borderColor = 'rgba(168, 85, 247, 0.3)';
            } else {
                root.style.setProperty('--current-theme', 'var(--accent-green)');
                document.getElementById('navbar').style.borderColor = 'var(--border)';
            }

            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function copyIP() {
            const ip = "66.51.97.61:25560";
            navigator.clipboard.writeText(ip).then(() => {
                const status = document.getElementById('copy-status');
                status.innerText = "COPIED";
                status.style.background = "#39ff14";
                status.style.color = "#000";
                setTimeout(() => {
                    status.innerText = "COPY IP";
                    status.style.background = "#000";
                    status.style.color = "#fff";
                }, 2000);
            });
        }
    </script>
</body>
</html>
