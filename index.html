<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASKED SMP | VORTEX CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --alert-red: #ff3e3e;
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
            --input-bg: #e8f0fe;
            --text: #ffffff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--dark-bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-green);
            padding: 20px; display: flex; justify-content: center; gap: 25px; z-index: 1000;
        }
        nav a { color: #666; text-decoration: none; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        .page { display: none; padding-top: 100px; min-height: 100vh; animation: fadeIn 0.5s ease-out; }
        .page.active { display: block; }

        /* --- HERO --- */
        .hero { text-align: center; padding: 40px 20px; }
        .king-logo {
            width: 200px; height: 200px; border-radius: 50%;
            border: 5px solid var(--neon-green); box-shadow: 0 0 50px rgba(57, 255, 20, 0.4);
            margin-bottom: 20px; object-fit: cover; animation: pulse 3s infinite;
        }

        /* --- CARDS & GRIDS --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card-bg); border: 1px solid #1a1a1a; padding: 30px; border-radius: 20px; margin-bottom: 30px; text-align: center; }
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .user-card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; transition: 0.3s; position: relative; }
        .user-card:hover { border-color: var(--neon-green); transform: translateY(-5px); }
        .user-card a { text-decoration: none; font-size: 1.5rem; font-weight: 900; display: block; }

        /* --- TIMER --- */
        #timer { font-family: 'JetBrains Mono'; font-size: 3rem; color: var(--neon-green); margin: 20px 0; font-weight: bold; }

        /* --- FORMS --- */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: var(--input-bg); font-weight: bold; color: #000; }
        .btn { width: 100%; padding: 15px; background: var(--neon-green); color: black; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .delete-btn { background: var(--alert-red); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; margin-top: 15px; font-size: 0.7rem; font-weight: bold; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .gallery img { width: 100%; border-radius: 10px; border: 1px solid var(--neon-green); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('events')">Events</a>
        <a onclick="showPage('staff')">Staff</a>
        <a onclick="showPage('members')">Members</a>
        <a onclick="showPage('admin')">Admin</a>
    </nav>

    <section id="home" class="page active">
        <div class="hero">
            <img src="25383CA6-689D-401E-A674-E956D0BCE482.jpg" class="king-logo">
            <h1 style="font-family:'Black Ops One'; font-size: 3.5rem; margin: 0;">MASKED SMP</h1>
            <p style="color:var(--neon-green); letter-spacing:3px; font-weight:bold;">PROTOCOL: VORTEX ACCESS</p>
        </div>
    </section>

    <section id="events" class="page">
        <div class="container">
            <div class="card">
                <h2 style="font-family:'Black Ops One';">SYSTEM COUNTDOWN</h2>
                <div id="timer">00d 00h 00m 00s</div>
                <h3 id="event-desc" style="color: #666; text-transform: uppercase;">Awaiting Synchronization...</h3>
            </div>
        </div>
    </section>

    <section id="staff" class="page">
        <div class="container">
            <h2 style="text-align:center; font-family:'Black Ops One';">THE COUNCIL</h2>
            <div id="staff-list" class="user-grid"></div>
        </div>
    </section>

    <section id="members" class="page">
        <div class="container">
            <h2 style="text-align:center; font-family:'Black Ops One';">CITIZENS</h2>
            <div id="member-list" class="user-grid"></div>
        </div>
    </section>

    <section id="admin" class="page">
        <div class="container">
            <div id="login-section" class="card">
                <h2 id="gate-title" style="font-family:'Black Ops One';">ADMIN LOGIN</h2>
                <div style="max-width: 350px; margin: 0 auto;">
                    <input type="text" id="userInp" placeholder="USERNAME">
                    <input type="password" id="passInp" placeholder="PASSWORD">
                    <button class="btn" onclick="handleAuth()">Authenticate</button>
                    <p id="error-text" style="color: var(--alert-red); display:none; margin-top:10px; font-weight:bold;">ACCESS DENIED</p>
                </div>
            </div>

            <div id="dashboard" style="display:none;">
                <div class="card">
                    <h2 style="color:var(--neon-green); font-family:'Black Ops One';">SYSTEM DASHBOARD</h2>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; text-align: left;">
                        <div style="background: #111; padding: 20px; border-radius: 15px;">
                            <h3>Personnel Management</h3>
                            <input type="text" id="newName" placeholder="Display Name">
                            <input type="text" id="newYT" placeholder="YouTube Link (Full URL)">
                            <input type="text" id="newRole" placeholder="Role (e.g. Founder)">
                            <input type="color" id="newColor" value="#39ff14" style="height:40px; cursor:pointer;">
                            <select id="newType">
                                <option value="staff">Staff List</option>
                                <option value="member">Member List</option>
                            </select>
                            <button class="btn" onclick="addUser()">Deploy to Site</button>
                        </div>
                        <div style="background: #111; padding: 20px; border-radius: 15px;">
                            <h3>Event Control</h3>
                            <input type="datetime-local" id="eventDate">
                            <input type="text" id="eventText" placeholder="Event Description">
                            <button class="btn" onclick="updateEvent()">Sync Timer</button>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>Gallery Vault</h3>
                    <input type="file" id="imgUp" accept="image/*" multiple>
                    <div id="admin-gallery" class="gallery" style="margin-top:20px;"></div>
                    <button class="delete-btn" style="width:100%" onclick="clearGallery()">WIPE GALLERY</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let currentGate = 1;
        let eventEnd = localStorage.getItem('eventEnd') || null;
        let eventName = localStorage.getItem('eventName') || "Incoming Event";

        // INIT
        window.onload = () => {
            loadUsers();
            loadGallery();
            if(eventEnd) document.getElementById('event-desc').innerText = eventName;
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // LOGIN SYSTEM
        function handleAuth() {
            const u = document.getElementById('userInp').value;
            const p = document.getElementById('passInp').value;
            const err = document.getElementById('error-text');

            if (currentGate === 1) {
                if (u === "RoyalAilen" && p === "Royal13!") {
                    currentGate = 2;
                    document.getElementById('gate-title').innerText = "VORTEX VERIFICATION";
                    document.getElementById('userInp').value = ""; 
                    document.getElementById('passInp').value = "";
                    err.style.display = "none";
                } else { err.style.display = "block"; }
            } else if (currentGate === 2) {
                if (u === "VORTEX" && p === "VOR13!!") {
                    document.getElementById('login-section').style.display = "none";
                    document.getElementById('dashboard').style.display = "block";
                } else { err.style.display = "block"; }
            }
        }

        // USER MANAGEMENT
        function addUser() {
            const name = document.getElementById('newName').value;
            const yt = document.getElementById('newYT').value || "#";
            const role = document.getElementById('newRole').value;
            const color = document.getElementById('newColor').value;
            const type = document.getElementById('newType').value;
            if(!name) return;

            const userData = { name, yt, role, color, type, id: Date.now() };
            let users = JSON.parse(localStorage.getItem('users') || "[]");
            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));
            
            renderUser(userData);
            document.getElementById('newName').value = "";
            document.getElementById('newYT').value = "";
        }

        function renderUser(u) {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.id = `user-${u.id}`;
            div.innerHTML = `
                <a href="${u.yt}" target="_blank" style="color:${u.color}">${u.name}</a>
                <p style="font-size:0.85rem; color:#666; margin-top:5px; text-transform:uppercase; font-weight:900;">${u.role}</p>
                <button class="delete-btn" onclick="deleteUser(${u.id})">TERMINATE</button>
            `;
            document.getElementById(u.type + '-list').appendChild(div);
        }

        function deleteUser(id) {
            let users = JSON.parse(localStorage.getItem('users') || "[]");
            users = users.filter(u => u.id !== id);
            localStorage.setItem('users', JSON.stringify(users));
            document.getElementById(`user-${id}`).remove();
        }

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users') || "[]");
            users.forEach(renderUser);
        }

        // EVENT SYSTEM
        function updateEvent() {
            const dateVal = document.getElementById('eventDate').value;
            if(!dateVal) return;
            eventEnd = new Date(dateVal).getTime();
            eventName = document.getElementById('eventText').value || "Incoming Event";
            
            localStorage.setItem('eventEnd', eventEnd);
            localStorage.setItem('eventName', eventName);
            document.getElementById('event-desc').innerText = eventName;
        }

        setInterval(() => {
            if (!eventEnd) return;
            const d = eventEnd - new Date().getTime();
            if (d < 0) { document.getElementById('timer').innerHTML = "EVENT ACTIVE"; return; }
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((d % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
        }, 1000);

        // GALLERY SYSTEM
        document.getElementById('imgUp').onchange = function(e) {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const imgs = JSON.parse(localStorage.getItem('gallery') || "[]");
                    imgs.push(ev.target.result);
                    localStorage.setItem('gallery', JSON.stringify(imgs));
                    renderImg(ev.target.result);
                };
                reader.readAsDataURL(file);
            });
        };

        function renderImg(src) {
            const img = document.createElement('img');
            img.src = src;
            document.getElementById('admin-gallery').appendChild(img);
        }

        function loadGallery() {
            const imgs = JSON.parse(localStorage.getItem('gallery') || "[]");
            imgs.forEach(renderImg);
        }

        function clearGallery() {
            localStorage.removeItem('gallery');
            document.getElementById('admin-gallery').innerHTML = "";
        }
    </script>
</body>
</html>
