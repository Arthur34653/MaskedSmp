<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masked SMP | Official App</title>
    
    <meta name="theme-color" content="#060606">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Masked%20SMP%22,%22short_name%22:%22MSMP%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23060606%22,%22theme_color%22:%22%2339ff14%22,%22icons%22:[{%22src%22:%22https://mc-heads.net/avatar/RoyalAlien/192%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22https://mc-heads.net/avatar/RoyalAlien/512%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Orbitron:wght@700;900&display=swap');

        :root {
            --accent-green: #39ff14;
            --vortex-purple: #a855f7;
            --bg-dark: #060606;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; }

        nav {
            position: fixed; width: 95%; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; backdrop-filter: blur(15px); background: rgba(10, 10, 10, 0.7);
            border: 1px solid var(--glass-border); padding: 0.8rem;
            display: flex; justify-content: center; gap: 15px; border-radius: 100px;
            flex-wrap: wrap;
        }
        nav a, nav button { 
            color: #888; text-decoration: none; font-size: 0.6rem; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            background: none; border: none; outline: none;
        }
        nav a.active { color: var(--accent-green); text-shadow: 0 0 10px var(--accent-green); }
        
        /* INSTALL BUTTON */
        #install-btn { 
            display: none; background: var(--accent-green); color: #000; 
            padding: 5px 12px; border-radius: 20px; margin-left: 5px;
        }

        .content-section { display: none; padding: 140px 20px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 25px; border-radius: 25px; text-align: center; position: relative; transition: 0.3s; }
        .card img { width: 90px; margin-bottom: 10px; }
        
        .role-badge { padding: 4px 10px; border-radius: 50px; font-size: 0.55rem; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); color: var(--accent-green); display: inline-block; margin-top: 8px; }
        .channel-link { display: block; margin-top: 15px; padding: 8px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; border-radius: 10px; font-size: 0.6rem; font-weight: 800; border: 1px solid #333; }

        /* ADMIN */
        .admin-list-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 0.8rem; }
        .del-btn { background: #ff4444; color: #fff; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; }
        .admin-btn { width: 100%; padding: 12px; background: var(--accent-green); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .count-circle { width: 130px; height: 130px; border: 2px solid var(--accent-green); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        .count-num { font-family: 'Orbitron'; font-size: 2.5rem; color: #fff; }

        h1, h2, h3 { font-family: 'Orbitron'; text-align: center; }
        footer { text-align: center; padding: 40px; color: #333; font-size: 0.6rem; }
    </style>
</head>
<body>

    <nav>
        <a onclick="showPage('home')" id="home-nav" class="active">Home</a>
        <a onclick="checkAdminGate()" id="control-nav">Control</a>
        <a onclick="showPage('staff')">Council</a>
        <a onclick="showPage('members')">Members</a>
        <a onclick="showPage('gallery')">Vault</a>
        <button id="install-btn">Download App</button>
    </nav>

    <div id="home" class="content-section active">
        <h1 style="font-size: 3.5rem; color: var(--accent-green);">MASKED SMP</h1>
        <div class="count-circle">
            <span class="count-num" id="total-players">0</span>
            <span style="font-size:0.5rem; color:var(--accent-green); letter-spacing:1px;">CITIZENS</span>
        </div>
        <div id="event-display" style="display:none; text-align:center; margin-top:20px;">
            <h2 id="ev-title" style="font-size:0.8rem; color:var(--accent-green); margin-bottom:5px;"></h2>
            <div id="timer-ui" style="display:inline-flex; font-family:Orbitron; background:#000; padding:10px; border-radius:10px; border:1px solid var(--accent-green); font-size:1.5rem;">
                <span id="h-val">00</span>:<span id="m-val">00</span>:<span id="s-val">00</span>
            </div>
        </div>
    </div>

    <div id="login-page" class="content-section">
        <div class="login-card" style="max-width:350px; margin:0 auto; text-align:center;">
            <h2>ADMIN</h2>
            <input type="text" id="user-in" class="login-input" placeholder="User">
            <input type="password" id="pass-in" class="login-input" placeholder="Pass">
            <button class="admin-btn" onclick="tryLogin()">Enter</button>
        </div>
    </div>

    <div id="admin-panel" class="content-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <h3 id="who-is">DASHBOARD</h3>
            <button onclick="logout()" style="color:#ff4444; background:none; border:none; cursor:pointer;">Logout</button>
        </div>
        <div class="grid">
            <div class="card" style="text-align:left; grid-row: span 2;">
                <h3>MANAGE</h3>
                <div id="admin-player-list"></div>
            </div>
            <div class="card" style="text-align:left;">
                <h3>ADD PLAYER</h3>
                <input type="text" id="new-name" placeholder="Name" class="login-input">
                <input type="text" id="new-role" placeholder="Role" class="login-input">
                <input type="text" id="new-link" placeholder="Channel Link" class="login-input">
                <select id="new-type" class="login-input"><option value="staff">Council</option><option value="member">Citizen</option></select>
                <button class="admin-btn" onclick="addPerson()">Save</button>
            </div>
            <div class="card" style="text-align:left;">
                <h3>EVENT</h3>
                <div style="display:flex; gap:2px;"><input type="number" id="ev-h" placeholder="H" class="login-input"><input type="number" id="ev-m" placeholder="M" class="login-input"><input type="number" id="ev-s" placeholder="S" class="login-input"></div>
                <button class="admin-btn" onclick="setEvent()">Start</button>
            </div>
        </div>
    </div>

    <div id="staff" class="content-section"><h2>THE COUNCIL</h2><div class="grid" id="staff-list"></div></div>
    <div id="members" class="content-section"><h2>CITIZENS</h2><div class="grid" id="member-list"></div></div>
    <div id="gallery" class="content-section"><h2>VAULT</h2><div class="grid" id="gallery-list"></div></div>

    <footer>CORE NEXUS</footer>

    <script>
        // --- PWA LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // --- CORE LOGIC ---
        let isAdmin = sessionStorage.getItem('msmp_admin') || null;

        window.onload = () => {
            if(isAdmin) document.getElementById('who-is').innerText = "OP: " + isAdmin;
            loadData();
            checkEvents();
        };

        function showPage(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            if(id === 'home') document.getElementById('home-nav').classList.add('active');
        }

        function checkAdminGate() {
            if(isAdmin) showPage('admin-panel');
            else showPage('login-page');
        }

        function tryLogin() {
            const u = document.getElementById('user-in').value.trim().toLowerCase();
            const p = document.getElementById('pass-in').value.trim();
            if((u === "royalalien" && p === "Royal13!") || (u === "v0rt6x" && p === "V0R13!!")) {
                sessionStorage.setItem('msmp_admin', u.toUpperCase());
                location.reload();
            }
        }

        function logout() { sessionStorage.removeItem('msmp_admin'); location.reload(); }

        function addPerson() {
            const name = document.getElementById('new-name').value;
            const role = document.getElementById('new-role').value || "MEMBER";
            const link = document.getElementById('new-link').value || "";
            const type = document.getElementById('new-type').value;
            if(!name) return;
            let ppl = JSON.parse(localStorage.getItem('msmp_ppl') || "[]");
            ppl.push({ name, role, type, link });
            localStorage.setItem('msmp_ppl', JSON.stringify(ppl));
            location.reload();
        }

        function loadData() {
            const ppl = JSON.parse(localStorage.getItem('msmp_ppl') || "[]");
            document.getElementById('total-players').innerText = ppl.length;
            ppl.forEach((p, i) => {
                const div = document.createElement('div'); div.className = 'card';
                const l = p.link ? `<a href="${p.link}" target="_blank" class="channel-link">SOCIAL</a>` : '';
                div.innerHTML = `<img src="https://mc-heads.net/body/${p.name}/right"><h3>${p.name}</h3><div class="role-badge">${p.role}</div>${l}`;
                document.getElementById(p.type === 'staff' ? 'staff-list' : 'member-list').appendChild(div);
                if(isAdmin) {
                    const item = document.createElement('div'); item.className = 'admin-list-item';
                    item.innerHTML = `<span>${p.name}</span> <button class="del-btn" onclick="delItem(${i})">X</button>`;
                    document.getElementById('admin-player-list').appendChild(item);
                }
            });
        }

        function delItem(i) {
            if(!confirm("Remove?")) return;
            let data = JSON.parse(localStorage.getItem('msmp_ppl'));
            data.splice(i, 1);
            localStorage.setItem('msmp_ppl', JSON.stringify(data));
            location.reload();
        }

        function setEvent() {
            const end = Date.now() + (parseInt(document.getElementById('ev-h').value)||0)*3600000 + (parseInt(document.getElementById('ev-m').value)||0)*60000 + (parseInt(document.getElementById('ev-s').value)||0)*1000;
            localStorage.setItem('msmp_ev', JSON.stringify({ end, host: isAdmin }));
            location.reload();
        }

        function checkEvents() {
            const data = JSON.parse(localStorage.getItem('msmp_ev'));
            if(!data) return;
            document.getElementById('event-display').style.display = 'block';
            setInterval(() => {
                const diff = data.end - Date.now();
                if(diff <= 0) { localStorage.removeItem('msmp_ev'); location.reload(); return; }
                document.getElementById('h-val').innerText = Math.floor(diff/3600000).toString().padStart(2,'0');
                document.getElementById('m-val').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                document.getElementById('s-val').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            }, 1000);
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const sw = 'data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9Pnt9KTs=';
            navigator.serviceWorker.register(sw);
        }
    </script>
</body>
</html>
