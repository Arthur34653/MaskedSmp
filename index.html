<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masked SMP | Official</title>
    <style>
        :root {
            --primary: #ff3e3e; 
            --vortex-purple: #9d4eff;
            --alien-green: #39ff14;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            text-align: center;
        }

        header {
            padding: 80px 20px;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://i.imgur.com/8Q9S8XJ.jpg'); 
            background-size: cover;
            border-bottom: 4px solid var(--primary);
        }

        h1 { font-size: 3.5rem; margin: 0; letter-spacing: 4px; text-shadow: 0 0 20px var(--primary); }
        
        .ip-badge {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .ip-badge:hover { transform: scale(1.05); background: white; }

        .section-title { margin-top: 50px; font-size: 2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- THEMED CARDS --- */
        .video-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #333;
            transition: 0.3s;
        }

        .vortex-card:hover { border-color: var(--vortex-purple); box-shadow: 0 0 20px rgba(157, 78, 255, 0.3); }
        .alien-card:hover { border-color: var(--alien-green); box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }

        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; }

        .vortex-name { margin-top: 15px; font-weight: bold; font-size: 1.2rem; color: var(--vortex-purple); text-shadow: 0 0 5px var(--vortex-purple); }
        .alien-name { margin-top: 15px; font-weight: bold; font-size: 1.2rem; color: var(--alien-green); text-shadow: 0 0 5px var(--alien-green); }

        /* --- BUTTONS --- */
        .social-btns { margin: 40px 0; }
        .btn {
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            margin: 10px;
            display: inline-block;
            transition: 0.3s;
        }
        .discord { background: #5865F2; color: white; }
        .v-btn { background: var(--vortex-purple); color: white; }
        .a-btn { background: var(--alien-green); color: black; }
        
        .btn:hover { opacity: 0.8; transform: translateY(-3px); }

        footer { padding: 60px; color: #444; font-size: 0.9rem; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <header>

        <div class="ip-badge" onclick="copyIP()">IP: 66.51.97.61:25560</div>

    <div class="social-btns">

        <a href="https://www.youtube.com/@V0RT6X1" class="btn v-btn" target="_blank">V0RT6X1 YouTube</a>
        <a href="https://www.youtube.com/@RoyalAlien" class="btn a-btn" target="_blank">RoyalAlien YouTube</a>
    </div>

    <h2 class="section-title">Latest Videos</h2>
    
    <div class="video-container">
        <div class="video-card vortex-card">
            <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUV0RT6X1"></iframe>
            <div class="vortex-name">V0RT6X1</div>
        </div>

        <div class="video-card alien-card">
            <iframe src="https://www.youtube.com/embed?listType=playlist&list=UURoyalAlien"></iframe>
            <div class="alien-name">RoyalAlien</div>
