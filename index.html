<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Masked SMP | Official</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2285%22 font-family=%22Arial Black, sans-serif%22 fill=%22%2339ff14%22>M</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Orbitron:wght@700;900&display=swap');

        :root {
            --accent-green: #39ff14;
            --vortex-purple: #a855f7;
            --bg-dark: #060606;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --current-theme: var(--accent-green);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        nav {
            position: fixed; width: 100%; top: 0; z-index: 1000;
            backdrop-filter: blur(20px); background: rgba(6, 6, 6, 0.8);
            border-bottom: 1px solid var(--border); padding: 1.2rem;
            display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;
        }
        nav a { color: #666; text-decoration: none; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; cursor: pointer; }
        nav a.active { color: var(--current-theme); text-shadow: 0 0 15px var(--current-theme); }

        .content-section { display: none; padding: 160px 20px 60px; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.8s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 5rem); color: var(--accent-green); text-shadow: 0 0 30px rgba(57, 255, 20, 0.3); margin-top: 10px; }

        /* --- PLAYER COUNT STYLES --- */
        .player-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #aaa;
        }
        .online-dot { width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #count-num { color: var(--accent-green); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .staff-card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px 20px; border-radius: 20px; text-align: center; transition: 0.4s; }
        .staff-card img { width: 130px; height: auto; margin-bottom: 20px; }

        /* --- ADMIN & EVENT --- */
        #event-display { display: none; margin-top: 40px; padding: 30px; border: 1px dashed var(--accent-green); border-radius: 20px; }
        .timer { display: flex; justify-content: center; gap: 20px; font-family: 'Orbitron'; margin-top: 15px; }
        .time-unit { font-size: 2.5rem; color: var(--accent-green); }
        .flashing { animation: eventFlash 0.3s infinite !important; }
        @keyframes eventFlash { 0%, 100% { border-color: var(--accent-green); } 50% { border-color: var(--vortex-purple); } }
        .fade-out { opacity: 0; transition: 10s; }

        footer { text-align: center; padding: 80px 0 40px; color: #222; font-size: 0.7rem; font-weight: 800; letter-spacing: 3px; }

    </style>
</head>
<body>

    <nav id="navbar">
        <a onclick="showTab('home', 'green')" id="home-btn" class="active">Home</a>
        <a onclick="handleAdminClick()" id="admin-btn">Admin</a>
        <a onclick="showTab('vortex', 'purple')" id="vortex-btn">V0RT6X1</a>
        <a onclick="showTab('alien', 'green')" id="alien-btn">RoyalAlien</a>
        <a onclick="showTab('staff', 'green')" id="staff-btn">Staff</a>
    </nav>

    <div id="home" class="content-section active">
        <div class="hero">
            <div class="player-status">
                <div class="online-dot"></div>
                <span id="player-count">PLAYERS ONLINE: <span id="count-num">...</span></span>
            </div>
            <h1>MASKED SMP</h1>
            
            <div id="event-display">
                <p id="event-title" style="text-transform:uppercase; letter-spacing:3px; font-size:0.8rem; color:var(--accent-green);">EVENT STARTING</p>
                <div class="timer">
                    <div><span class="time-unit" id="h-val">00</span><small style="display:block; font-size:0.6rem;">HRS</small></div>
                    <div><span class="time-unit" id="m-val">00</span><small style="display:block; font-size:0.6rem;">MINS</small></div>
                    <div><span class="time-unit" id="s-val">00</span><small style="display:block; font-size:0.6rem;">SECS</small></div>
                </div>
            </div>
        </div>
    </div>

    <div id="staff" class="content-section">
        <h2 style="text-align:center; margin-bottom:50px; font-family:'Orbitron';">THE COUNCIL</h2>
        <div class="grid">
            <div class="staff-card">
                <img src="https://mc-heads.net/body/V0RT6X/right" alt="V0RT6X">
                <h3 style="color:var(--vortex-purple); font-family:'Orbitron';">V0RT6X</h3>
                <div style="font-size:0.7rem; letter-spacing:3px; margin-top:10px;">Admin</div>
            </div>
            <div class="staff-card">
                <img src="https://mc-heads.net/body/Proximally/right" alt="RoyalAlien">
                <h3 style="color:var(--accent-green); font-family:'Orbitron';">RoyalAlien</h3>
                <div style="font-size:0.7rem; letter-spacing:3px; margin-top:10px;">Owner</div>
            </div>
        </div>
    </div>

    <div id="admin" class="content-section">
        <div style="background: rgba(255,255,255,0.03); padding:40px; border-radius:20px; text-align:center; max-width:500px; margin:0 auto; border: 1px solid #333;">
            <h2 style="font-family:'Orbitron'; color:var(--accent-green);">ADMIN ACCESS</h2>
            <input type="text" id="event-name-input" placeholder="Event Name" style="width:100%; padding:12px; margin-top:20px; background:#111; border:1px solid #444; color:white; border-radius:8px;">
            <div style="display:flex; gap:10px; margin:15px 0;">
                <input type="number" id="h-input" placeholder="Hrs" style="flex:1; padding:12px; background:#111; border:1px solid #444; color:white; border-radius:8px;">
                <input type="number" id="m-input" placeholder="Min" style="flex:1; padding:12px; background:#111; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <button onclick="startCountdown()" style="width:100%; padding:15px; background:var(--accent-green); color:black; border:none; border-radius:8px; font-weight:900; cursor:pointer;">START EVENT</button>
        </div>
    </div>

    <div id="vortex" class="content-section"><h2>V0RT6X1 ARCHIVE</h2><div class="grid"><iframe src="https://www.youtube.com/embed?listType=user_uploads&list=V0RT6X1" allowfullscreen></iframe></div></div>
    <div id="alien" class="content-section"><h2>ROYALALIEN ARCHIVE</h2><div class="grid"><iframe src="https://www.youtube.com/embed?listType=user_uploads&list=Proximally" allowfullscreen></iframe></div></div>

    <footer>Masked Smp Powerd by V0RT6X</footer>

    <script>
        let countdownInterval;
        let isAdmin = false;

        function showTab(tabId, theme) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            if(document.getElementById(tabId + '-btn')) document.getElementById(tabId + '-btn').classList.add('active');
            document.querySelector(':root').style.setProperty('--current-theme', theme === 'purple' ? 'var(--vortex-purple)' : 'var(--accent-green)');
        }

        // --- FETCH PLAYER COUNT ---
        function getPlayerCount() {
            fetch('https://api.mcsrvstat.us/2/66.51.97.61:25560')
                .then(res => res.json())
                .then(data => {
                    const countElem = document.getElementById('count-num');
                    if (data.online) {
                        countElem.innerText = data.players.online;
                    } else {
                        countElem.innerText = "OFFLINE";
                        countElem.style.color = "#ff4444";
                    }
                })
                .catch(() => {
                    document.getElementById('count-num').innerText = "ERR";
                });
        }
        getPlayerCount();
        setInterval(getPlayerCount, 30000); // Update every 30 seconds

        function handleAdminClick() {
            if (isAdmin) return showTab('admin', 'green');
            if (prompt("Email:") === "a_hipkins@outlook.com" && prompt("Pass:") === "Arthurtom13") {
                isAdmin = true;
                showTab('admin', 'green');
            }
        }

        function startCountdown() {
            const name = document.getElementById('event-name-input').value || "EVENT";
            const h = parseInt(document.getElementById('h-input').value) || 0;
            const m = parseInt(document.getElementById('m-input').value) || 0;
            let totalSeconds = (h * 3600) + (m * 60);
            if (totalSeconds <= 0) return alert("Set time!");
            document.getElementById('event-title').innerText = name;
            const display = document.getElementById('event-display');
            display.style.display = 'block';
            display.classList.remove('flashing', 'fade-out');
            showTab('home', 'green');
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                totalSeconds--;
                document.getElementById('h-val').innerText = Math.floor(totalSeconds/3600).toString().padStart(2,'0');
                document.getElementById('m-val').innerText = Math.floor((totalSeconds%3600)/60).toString().padStart(2,'0');
                document.getElementById('s-val').innerText = (totalSeconds%60).toString().padStart(2,'0');
                if (totalSeconds <= 0) { clearInterval(countdownInterval); triggerFinish(); }
            }, 1000);
        }

        function triggerFinish() {
            const d = document.getElementById('event-display');
            d.classList.add('flashing');
            document.getElementById('event-title').innerText = "LIVE NOW";
            setTimeout(() => { d.classList.add('fade-out'); setTimeout(() => d.style.display='none', 10000); }, 5000);
        }
    </script>
</body>
</html>
